<!DOCTYPE html>
<html>
<head>

<title>PWM Light Designer</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:Arial, sans-serif;
    background:#121212;
    color:white;
}


h1{
    text-align:center;
    color:#00ff88;
}


.container{
    max-width:1200px;
    margin:auto;
}


.card{

    background:#1e1e1e;
    padding:20px;
    margin-bottom:20px;
    border-radius:15px;
    box-shadow:0 0 15px #000;

}


label{

    display:block;
    margin-top:10px;
    color:#aaa;

}


input,select{

    width:100%;
    padding:10px;
    margin-top:5px;
    background:#303030;
    color:white;
    border:none;
    border-radius:8px;

}


button{

    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-size:16px;
    cursor:pointer;

}


button:hover{

    background:#00ff66;

}



.channelBox{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    background:#252525;
    padding:10px;
    margin-top:10px;
    border-radius:10px;

}



table{

    width:100%;
    border-collapse:collapse;
    margin-top:20px;

}


th{

    background:#333;
    padding:10px;

}


td{

    text-align:center;
    border:1px solid #444;
    padding:8px;

}



.cell{

    width:35px;
    height:35px;
    background:#333;
    border-radius:7px;
    cursor:pointer;
    margin:auto;

}


.cell:hover{

    background:#555;

}



.cell.on{

    background:#00ff66;
    box-shadow:
    0 0 10px #00ff66,
    0 0 20px #00ff66;

}



.delay{

    width:80px;

}



</style>

</head>


<body>


<div class="container">


<h1>💡 PWM Light Designer</h1>



<div class="card">

<h2>Project Setup</h2>


<label>Project Name</label>

<input id="projectName"
placeholder="My Light Project">



<label>Select Board</label>

<select id="board">

<option>Arduino UNO</option>
<option>Arduino Nano</option>
<option>ESP8266</option>
<option>ESP32</option>

</select>



<label>Number of Channels</label>

<input id="channelCount"
type="number"
value="4">



<label>Number of Frames</label>

<input id="frameCount"
type="number"
value="10">



<button onclick="createChannels()">
Setup Channels
</button>


</div>





<div class="card">

<h2>Channel Configuration</h2>

<div id="channels"></div>


<button onclick="createTimeline()">
Create Timeline
</button>


</div>






<div class="card">


<h2>Animation Timeline</h2>


<div id="timeline">

Create channels first...

</div>


</div>




</div>






<script>


let channelData=[];

let frameData=[];



function createChannels(){


let count =
Number(document.getElementById("channelCount").value);



let html="";


for(let i=0;i<count;i++){


html += `

<div class="channelBox">


<div>

Channel ${i+1}

</div>


<div>

Name:

<input id="name${i}"
value="CH${i+1}">


</div>


<div>

Pin:

<input id="pin${i}"
value="${i+2}">


</div>


</div>

`;

}


document.getElementById("channels").innerHTML=html;


}







function createTimeline(){



channelData=[];



let channels =
Number(document.getElementById("channelCount").value);



let frames =
Number(document.getElementById("frameCount").value);



for(let i=0;i<channels;i++){


channelData.push({

name:
document.getElementById("name"+i).value,


pin:
document.getElementById("pin"+i).value


});


}




frameData=[];


let html="<table>";



html+="<tr>";

html+="<th>Frame</th>";



channelData.forEach(ch=>{


html+=`<th>${ch.name}<br>Pin ${ch.pin}</th>`;


});



html+="<th>Delay</th>";

html+="</tr>";





for(let f=0;f<frames;f++){



frameData[f]=[];

html+="<tr>";



html+=`<td>Frame ${f+1}</td>`;




for(let c=0;c<channels;c++){



frameData[f][c]=0;



html+=`

<td>

<div class="cell"

onclick="toggleCell(this,${f},${c})">

</div>

</td>


`;

}



html+=`

<td>

<input class="delay"
value="500">

</td>

`;



html+="</tr>";



}



html+="</table>";



document.getElementById("timeline").innerHTML=html;



}








function toggleCell(element,frame,channel){



if(element.classList.contains("on")){


element.classList.remove("on");


frameData[frame][channel]=0;


}

else{


element.classList.add("on");


frameData[frame][channel]=1;


}



console.log("Channels");

console.log(channelData);



console.log("Frames");

console.log(frameData);



}



</script>


</body>

</html>
