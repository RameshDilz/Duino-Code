<!DOCTYPE html>
<html>

<head>

<title>PWM Light Designer</title>

<style>

*{
    box-sizing:border-box;
}

body{

    background:#101010;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
    padding:20px;

}


.container{

    max-width:1200px;
    margin:auto;

}


h1{

    text-align:center;
    color:#00ff88;
    font-size:36px;

}


.card{

    background:#1e1e1e;
    padding:20px;
    margin:20px 0;
    border-radius:15px;
    box-shadow:0 0 20px #000;

}


h2{

    color:#00ff88;

}


label{

    display:block;
    margin-top:15px;
    color:#aaa;

}



input,select{

    width:100%;
    padding:12px;
    margin-top:5px;
    background:#303030;
    color:white;
    border:none;
    border-radius:8px;

}



button{

    padding:10px 20px;
    margin-top:10px;
    background:#00c853;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;

}



button:hover{

    background:#00ff66;

}



.info{

    margin-top:15px;
    padding:15px;
    background:#252525;
    border-radius:10px;
    color:#00ff88;

}



.channelBox{

    display:flex;
    align-items:center;
    gap:20px;
    padding:10px;
    margin:10px 0;
    background:#252525;
    border-radius:10px;

}



.channelBox select{

    width:250px;

}



table{

    width:100%;
    border-collapse:collapse;
    margin-top:20px;

}



th{

    background:#333;
    padding:10px;

}



td{

    border:1px solid #555;
    text-align:center;
    padding:8px;

}



.cell{

    width:35px;
    height:35px;
    background:#333;
    border-radius:7px;
    cursor:pointer;
    margin:auto;

}



.cell:hover{

    background:#555;

}



.cell.on{

    background:#00ff66;
    box-shadow:0 0 15px #00ff66;

}



.delay{

    width:80px;

}



.warning{

    color:#ffcc00;

}


</style>


</head>


<body>


<div class="container">


<h1>💡 PWM Light Designer</h1>




<div class="card">


<h2>Project Setup</h2>


<label>
Project Name
</label>

<input id="projectName"
placeholder="My Light Project">



<label>
Select Board
</label>

<select id="board" onchange="updatePins()">

<option>Arduino UNO</option>
<option>Arduino Nano</option>
<option>Arduino Mega</option>
<option>ESP8266</option>
<option>ESP32</option>

</select>




<label>
Pin Selection Mode
</label>


<select id="pinMode" onchange="updatePins()">


<option value="safe">
Safe Mode
</option>


<option value="custom">
Custom Mode
</option>


</select>




<div class="info">


Board:
<span id="boardInfo"></span>

<br><br>


Available Pins:
<span id="pinInfo"></span>


<br><br>


Maximum Channels:
<span id="maxInfo"></span>


</div>




<label>
Channel Count
</label>


<input id="channelCount"
type="number"
min="1"
onchange="limitChannels()">





<label>
Initial Frame Count
</label>


<input id="frameCount"
type="number"
value="10"
min="1">





<button onclick="createChannels()">
Create Channels
</button>



</div>





<div class="card">


<h2>Channel Pin Assignment</h2>


<div id="channels">

No channels created

</div>



<button onclick="createTimeline()">

Create Timeline

</button>


</div>





<div class="card">


<h2>Timeline Editor</h2>


<div id="timeline">

Timeline will appear here

</div>


</div>



<!-- PART 2 STARTS HERE -->

<script>


// ======================================
// PIN DATABASE
// ======================================


// Safe recommended output pins

const safePins = {


"Arduino UNO":[
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13"
],


"Arduino Nano":[
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13"
],


"Arduino Mega":[
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13",
"D22","D23","D24","D25",
"D26","D27","D28","D29",
"D30","D31","D32","D33",
"D34","D35","D36","D37",
"D38","D39","D40","D41",
"D42","D43","D44","D45",
"D46","D47","D48","D49",
"D50","D51","D52","D53"
],


"ESP8266":[
"GPIO0",
"GPIO2",
"GPIO4",
"GPIO5",
"GPIO12",
"GPIO13",
"GPIO14",
"GPIO15",
"GPIO16"
],


"ESP32":[
"GPIO0",
"GPIO2",
"GPIO4",
"GPIO5",
"GPIO12",
"GPIO13",
"GPIO14",
"GPIO15",
"GPIO16",
"GPIO17",
"GPIO18",
"GPIO19",
"GPIO21",
"GPIO22",
"GPIO23",
"GPIO25",
"GPIO26",
"GPIO27",
"GPIO32",
"GPIO33"
]

};




// All pins (advanced mode)

const customPins = {


"Arduino UNO":[
"D0","D1",
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13",
"A0","A1","A2","A3","A4","A5"
],



"Arduino Nano":[
"D0","D1",
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13",
"A0","A1","A2","A3","A4","A5"
],



"Arduino Mega":[
"D0","D1",
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13",
"D22","D23","D24",
"D25","D26","D27",
"D28","D29","D30",
"D31","D32","D33",
"D34","D35","D36",
"D37","D38","D39",
"D40","D41","D42",
"D43","D44","D45",
"D46","D47","D48",
"D49","D50","D51",
"D52","D53"
],



"ESP8266":[
"GPIO0",
"GPIO1",
"GPIO2",
"GPIO3",
"GPIO4",
"GPIO5",
"GPIO12",
"GPIO13",
"GPIO14",
"GPIO15",
"GPIO16"
],



"ESP32":[
"GPIO0",
"GPIO1",
"GPIO2",
"GPIO3",
"GPIO4",
"GPIO5",
"GPIO6",
"GPIO7",
"GPIO8",
"GPIO9",
"GPIO10",
"GPIO11",
"GPIO12",
"GPIO13",
"GPIO14",
"GPIO15",
"GPIO16",
"GPIO17",
"GPIO18",
"GPIO19",
"GPIO21",
"GPIO22",
"GPIO23",
"GPIO25",
"GPIO26",
"GPIO27",
"GPIO32",
"GPIO33",
"GPIO34",
"GPIO35",
"GPIO36",
"GPIO39"
]

};





let availablePins=[];





// ======================================
// UPDATE BOARD PINS
// ======================================


function updatePins(){


let board =
document.getElementById("board").value;


let mode =
document.getElementById("pinMode").value;



if(mode=="safe"){

availablePins=safePins[board];

}

else{

availablePins=customPins[board];

}



document.getElementById("boardInfo").innerHTML=board;


document.getElementById("pinInfo").innerHTML=
availablePins.length;


document.getElementById("maxInfo").innerHTML=
availablePins.length;




let channel =
document.getElementById("channelCount");


channel.max=availablePins.length;


channel.value=availablePins.length;



}






// ======================================
// CHANNEL LIMIT
// ======================================


function limitChannels(){



let value =
Number(document.getElementById("channelCount").value);



if(value > availablePins.length){


alert(
"Maximum available channels: "
+ availablePins.length
);


document.getElementById("channelCount").value =
availablePins.length;


}



if(value < 1){

document.getElementById("channelCount").value=1;

}



}




updatePins();



// PART 3 STARTS HERE

// ======================================
// CREATE CHANNELS
// ======================================


let frameData=[];



function createChannels(){


let count =
Number(document.getElementById("channelCount").value);



let html="";



for(let i=0;i<count;i++){


html += `

<div class="channelBox">

<b>
CH ${i+1}
</b>


<select id="pin${i}" onchange="checkDuplicates()">



${availablePins.map((pin,index)=>

`<option value="${pin}" ${index==i?"selected":""}>
${pin}
</option>`

).join("")}


</select>


</div>

`;

}


document.getElementById("channels").innerHTML=html;


checkDuplicates();


}







// ======================================
// PREVENT DUPLICATE PINS
// ======================================


function checkDuplicates(){


let selects =
document.querySelectorAll("#channels select");



let values=[];



selects.forEach(s=>{

values.push(s.value);

});




selects.forEach((select,index)=>{


for(let option of select.options){


option.disabled=false;



if(values.includes(option.value)
&& option.value!=values[index]){


option.disabled=true;


}



}


});


}







// ======================================
// CREATE TIMELINE
// ======================================


function createTimeline(){



let channels =
Number(document.getElementById("channelCount").value);



let frames =
Number(document.getElementById("frameCount").value);



frameData=[];



for(let f=0;f<frames;f++){


let row=[];



for(let c=0;c<channels;c++){


row.push(0);


}



frameData.push(row);



}



renderTimeline();


}







// ======================================
// DRAW TIMELINE
// ======================================


function renderTimeline(){



let channels =
Number(document.getElementById("channelCount").value);



let html="<table>";



html += "<tr>";

html += "<th>Frame</th>";



for(let c=0;c<channels;c++){


html +=

`<th>
CH ${c+1}
</th>`;


}



html += "<th>Delay</th>";

html += "<th>Action</th>";

html += "</tr>";





frameData.forEach((row,f)=>{



html += "<tr>";



html +=

`<td>
${f+1}
</td>`;





for(let c=0;c<channels;c++){


let state =
row[c] ? "on" : "";



html +=

`

<td>

<div class="cell ${state}"

onclick="toggleCell(this,${f},${c})">

</div>

</td>

`;



}




html +=

`

<td>

<input class="delay" value="500">

</td>


<td>

<button onclick="removeFrame(${f})">

Remove

</button>

</td>


`;



html += "</tr>";



});





html +=

`

<tr>

<td colspan="${channels+3}">

<button onclick="addFrames()">

+ Add Frames

</button>


</td>

</tr>

`;




html += "</table>";



document.getElementById("timeline").innerHTML=html;



}







// ======================================
// ADD MORE FRAMES
// ======================================


function addFrames(){



let amount =
Number(prompt("How many frames add?"));



if(!amount || amount<1){

return;

}




let channels =
Number(document.getElementById("channelCount").value);




for(let i=0;i<amount;i++){



let row=[];



for(let c=0;c<channels;c++){


row.push(0);


}



frameData.push(row);



}



renderTimeline();



}







// ======================================
// REMOVE FRAME
// ======================================


function removeFrame(index){


frameData.splice(index,1);



renderTimeline();



}








// ======================================
// ON / OFF CELL CONTROL
// ======================================


function toggleCell(element,frame,channel){



if(frameData[frame][channel]==1){


frameData[frame][channel]=0;


element.classList.remove("on");


}

else{


frameData[frame][channel]=1;


element.classList.add("on");


}



console.log(frameData);


}



</script>


</body>

</html>
