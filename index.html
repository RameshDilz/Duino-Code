<!DOCTYPE html>
<html>

<head>

<title>Arduino Visual Designer</title>

<style>

*{
box-sizing:border-box;
}


body{

background:#101010;
color:white;
font-family:Arial,sans-serif;
padding:20px;

}


.container{

max-width:1200px;
margin:auto;

}


h1{

text-align:center;
color:#00ff88;

}


.card{

background:#1d1d1d;
padding:20px;
margin:20px 0;
border-radius:15px;

box-shadow:0 0 15px #000;

}


h2{

color:#00ff88;

}


label{

display:block;
margin-top:15px;
color:#aaa;

}



input,select,textarea{

width:100%;
padding:12px;
margin-top:5px;

background:#303030;
color:white;

border:none;
border-radius:8px;

}



button{

background:#00c853;
color:white;

border:none;
border-radius:8px;

padding:10px 20px;

margin-top:10px;

cursor:pointer;

}



button:hover{

background:#00ff66;

}




.info{

background:#252525;
padding:15px;
border-radius:10px;

color:#00ff88;

margin-top:15px;

}





.channelBox{

display:flex;
align-items:center;

gap:20px;

background:#252525;

padding:10px;

margin:10px 0;

border-radius:10px;

}



.channelBox select{

width:250px;

}





table{

width:100%;
border-collapse:collapse;

margin-top:20px;

}



th{

background:#333;
padding:10px;

}



td{

border:1px solid #555;
padding:8px;

text-align:center;

}




.cell{

width:35px;
height:35px;

background:#333;

border-radius:6px;

cursor:pointer;

margin:auto;

}



.cell:hover{

background:#555;

}



.cell.on{

background:#00ff66;

box-shadow:0 0 15px #00ff66;

}



.delay{

width:90px;

}



#arduinoCode{

height:450px;

font-family:monospace;

color:#00ff66;

background:#050505;

}



</style>

</head>


<body>


<div class="container">



<h1>
💡 Arduino Visual Designer
</h1>






<div class="card">


<h2>
Project Setup
</h2>



<label>
Project Name
</label>


<input id="projectName"
placeholder="My LED Project">





<label>
Board
</label>


<select id="board"
onchange="updatePins()">



<option>
Arduino UNO
</option>


<option>
Arduino Nano
</option>


<option>
Arduino Mega
</option>


<option>
ESP8266
</option>


<option>
ESP32
</option>


</select>






<label>
Pin Mode
</label>


<select id="pinMode"
onchange="updatePins()">



<option value="safe">

Safe Pins

</option>


<option value="custom">

Custom Pins

</option>


</select>








<div class="info">


Board:
<span id="boardInfo"></span>


<br><br>


Available Pins:
<span id="pinInfo"></span>


<br><br>


Maximum Channels:
<span id="maxInfo"></span>


</div>








<label>
Channel Count
</label>


<input id="channelCount"
type="number"
min="1"
onchange="limitChannels()">







<label>
Initial Frame Count
</label>


<input id="frameCount"
type="number"
value="10"
min="1">






<button onclick="createChannels()">

Create Channels

</button>



</div>









<div class="card">


<h2>
Channel Pin Assignment
</h2>



<div id="channels">

No channels created

</div>




<button onclick="createTimeline()">

Create Timeline

</button>



</div>









<div class="card">


<h2>
Timeline Editor
</h2>



<div id="timeline">

Timeline will appear here

</div>



</div>









<div class="card">


<h2>
⚡ Arduino Code Generator
</h2>



<button onclick="generateArduinoCode()">

Generate Arduino Code

</button>




<textarea id="arduinoCode">

Generated Arduino code will appear here...

</textarea>





<button onclick="copyCode()">

📋 Copy Code

</button>




<button onclick="downloadCode()">

⬇ Download .ino

</button>



</div>





<!-- PART 2 STARTS HERE -->

<script>


// ===============================
// PIN DATABASE
// ===============================


const safePins = {


"Arduino UNO":[
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13"
],


"Arduino Nano":[
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13"
],


"Arduino Mega":[
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13",
"D22","D23","D24","D25",
"D26","D27","D28","D29",
"D30","D31","D32","D33",
"D34","D35","D36","D37",
"D38","D39","D40","D41",
"D42","D43","D44","D45",
"D46","D47","D48","D49",
"D50","D51","D52","D53"
],


"ESP8266":[
"GPIO0",
"GPIO2",
"GPIO4",
"GPIO5",
"GPIO12",
"GPIO13",
"GPIO14",
"GPIO15",
"GPIO16"
],


"ESP32":[
"GPIO0","GPIO2","GPIO4","GPIO5",
"GPIO12","GPIO13","GPIO14","GPIO15",
"GPIO16","GPIO17","GPIO18","GPIO19",
"GPIO21","GPIO22","GPIO23",
"GPIO25","GPIO26","GPIO27",
"GPIO32","GPIO33"
]

};







const customPins = {


"Arduino UNO":[
"D0","D1",
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13",
"A0","A1","A2","A3","A4","A5"
],


"Arduino Nano":[
"D0","D1",
"D2","D3","D4","D5",
"D6","D7","D8","D9",
"D10","D11","D12","D13",
"A0","A1","A2","A3","A4","A5"
],


"Arduino Mega":[
"D0","D1","D2","D3",
"D4","D5","D6","D7",
"D8","D9","D10","D11",
"D12","D13",
"D22","D23","D24",
"D25","D26","D27",
"D28","D29","D30",
"D31","D32","D33",
"D34","D35","D36",
"D37","D38","D39",
"D40","D41","D42",
"D43","D44","D45",
"D46","D47","D48",
"D49","D50","D51",
"D52","D53"
],


"ESP8266":[
"GPIO0","GPIO1","GPIO2",
"GPIO3","GPIO4","GPIO5",
"GPIO12","GPIO13","GPIO14",
"GPIO15","GPIO16"
],


"ESP32":[
"GPIO0","GPIO1","GPIO2","GPIO3",
"GPIO4","GPIO5","GPIO12","GPIO13",
"GPIO14","GPIO15","GPIO16","GPIO17",
"GPIO18","GPIO19","GPIO21","GPIO22",
"GPIO23","GPIO25","GPIO26","GPIO27",
"GPIO32","GPIO33","GPIO34","GPIO35",
"GPIO36","GPIO39"
]

};





let availablePins=[];

let frameData=[];






// ===============================
// UPDATE PINS
// ===============================


function updatePins(){


let board =
document.getElementById("board").value;



let mode =
document.getElementById("pinMode").value;




if(mode=="safe")

availablePins=safePins[board];

else

availablePins=customPins[board];





document.getElementById("boardInfo").innerHTML=
board;



document.getElementById("pinInfo").innerHTML=
availablePins.length;



document.getElementById("maxInfo").innerHTML=
availablePins.length;



let ch =
document.getElementById("channelCount");


ch.max=availablePins.length;



if(ch.value>availablePins.length)

ch.value=availablePins.length;



}





updatePins();








function limitChannels(){


let value =
Number(document.getElementById("channelCount").value);



if(value>availablePins.length){


alert(
"Maximum channels: "
+
availablePins.length
);



document.getElementById("channelCount").value=
availablePins.length;


}



}









// ===============================
// CHANNEL CREATION
// ===============================


function createChannels(){


let count =
Number(document.getElementById("channelCount").value);



let html="";





for(let i=0;i<count;i++){



html+=`

<div class="channelBox">


<b>
CH ${i+1}
</b>



<select id="pin${i}"
onchange="checkDuplicates()">



${availablePins.map((p,index)=>


`

<option value="${p}"
${index==i?"selected":""}>

${p}

</option>

`

).join("")}



</select>


</div>


`;



}



document.getElementById("channels").innerHTML=
html;



checkDuplicates();


}









function checkDuplicates(){


let selects =
document.querySelectorAll("#channels select");



let used=[];



selects.forEach(s=>{


used.push(s.value);


});





selects.forEach((s,i)=>{



for(let option of s.options){



option.disabled=false;



if(
used.includes(option.value)
&&
option.value!=used[i]
){


option.disabled=true;


}



}



});



}




// PART 3 STARTS HERE

// ===============================
// CREATE TIMELINE
// ===============================


function createTimeline(){


let channels =
Number(document.getElementById("channelCount").value);



let frames =
Number(document.getElementById("frameCount").value);



frameData=[];




for(let i=0;i<frames;i++){


frameData.push({

state:new Array(channels).fill(0),

delay:500

});


}



renderTimeline();


}









// ===============================
// TIMELINE RENDER
// ===============================


function renderTimeline(){


let channels =
Number(document.getElementById("channelCount").value);



let mainDelay =
frameData.length ?
frameData[0].delay :
500;




let html="<table>";



html+=`

<tr>

<th>
Frame
</th>

`;




for(let c=0;c<channels;c++){


html+=`

<th>
CH${c+1}
</th>

`;

}





html+=`

<th>

Delay

<br>


<input type="number"

value="${mainDelay}"

style="width:80px"

onchange="setMainDelay(this.value)">


</th>



<th>

Action

</th>



</tr>

`;







frameData.forEach((frame,index)=>{


html+=`

<tr>

<td>
${index+1}
</td>

`;






frame.state.forEach((state,ch)=>{



html+=`

<td>


<div

class="cell ${state?"on":""}"

onclick="toggleCell(this,${index},${ch})">


</div>


</td>


`;



});





html+=`

<td>


<input

class="delay"

value="${frame.delay}"

onchange="changeDelay(${index},this.value)">



</td>



<td>


<button onclick="removeFrame(${index})">

Remove

</button>


</td>


</tr>


`;




});







html+=`

<tr>


<td colspan="${channels+3}">


<button onclick="addFrames()">

+ Add Frames

</button>





<button onclick="removeFramesRange()">

- Remove Frames

</button>



</td>


</tr>


`;





html+="</table>";




document.getElementById("timeline").innerHTML=
html;



}









// ===============================
// FRAME CONTROL
// ===============================



function toggleCell(element,frame,channel){



frameData[frame].state[channel]^=1;



element.classList.toggle("on");



}





function changeDelay(frame,value){


frameData[frame].delay=
Number(value);



}







function setMainDelay(value){


value =
Number(value);



frameData.forEach(frame=>{


frame.delay=value;


});



renderTimeline();



}








function addFrames(){


let amount =
Number(prompt("How many frames add?"));



if(!amount)
return;




let channels =
Number(document.getElementById("channelCount").value);






for(let i=0;i<amount;i++){



frameData.push({


state:new Array(channels).fill(0),


delay:500



});



}





renderTimeline();



}









function removeFrame(index){


frameData.splice(index,1);



renderTimeline();



}








function removeFramesRange(){


let start =
Number(prompt("Remove from frame:"));



let end =
Number(prompt("Remove to frame:"));





if(!start || !end)
return;




if(start<1)
start=1;



if(end>frameData.length)
end=frameData.length;





frameData.splice(

start-1,

end-start+1

);





renderTimeline();



}



// PART 4 STARTS HERE

// =====================================
// UNIVERSAL ARDUINO CODE GENERATOR
// BYTE ARRAY SYSTEM
// =====================================


function generateArduinoCode(){



let project =
document.getElementById("projectName").value;



if(project=="")
project="My_Project";




let board =
document.getElementById("board").value;




let channels =
Number(document.getElementById("channelCount").value);




let pins=[];



for(let i=0;i<channels;i++){


pins.push(
document.getElementById("pin"+i).value
);


}






// Calculate bytes needed

let bytesPerFrame =
Math.ceil(channels / 8);







let code=`/*
=====================================
 Arduino Visual Designer

 Project : ${project}
 Board   : ${board}

 Channels        : ${channels}
 Bytes / Frame   : ${bytesPerFrame}
 Frames          : ${frameData.length}

 Storage Type    : uint8_t

=====================================
*/


#include <Arduino.h>


`;







// Pins


for(let i=0;i<channels;i++){


let number =
pins[i].replace(/\D/g,'');



code +=

`#define CH${i+1} ${number}\n`;

}



code+=`

#define TOTAL_FRAMES ${frameData.length}

#define BYTES_PER_FRAME ${bytesPerFrame}


`;







// Animation array


code+=`

const uint8_t animation[TOTAL_FRAMES][BYTES_PER_FRAME] PROGMEM =
{

`;






frameData.forEach(frame=>{


let bytes =
new Array(bytesPerFrame).fill(0);




frame.state.forEach((state,index)=>{


if(state){


let byteIndex =
Math.floor(index/8);



let bitIndex =
index%8;



bytes[byteIndex] |=
(1<<bitIndex);


}



});





code += "{";



bytes.forEach((b,i)=>{


code+=b;



if(i<bytes.length-1)

code+=",";



});



code+="},\n";



});






code+=`

};



`;







// Delay data


code+=`

const uint16_t frameDelay[TOTAL_FRAMES] PROGMEM =
{


`;




frameData.forEach(frame=>{


code+=frame.delay+",\n";


});




code+=`

};



`;







// Setup


code+=`

void setup()
{

`;





for(let i=0;i<channels;i++){


code+=

`pinMode(CH${i+1},OUTPUT);\n`;



}




code+=`

}


`;









// Loop


code+=`

void loop()
{


for(uint16_t frame=0;
frame<TOTAL_FRAMES;
frame++)
{


`;







// create byte variables


for(let b=0;b<bytesPerFrame;b++){


code+=

`uint8_t data${b}=pgm_read_byte(&animation[frame][${b}]);\n`;



}





code+="\n";








for(let ch=0;ch<channels;ch++){



let byteIndex =
Math.floor(ch/8);



let bitIndex =
ch%8;





code+=

`digitalWrite(CH${ch+1}, data${byteIndex} & (1<<${bitIndex}));\n`;



}





code+=`

delay(
pgm_read_word(&frameDelay[frame])
);


}


}


`;






document.getElementById("arduinoCode").value=
code;



}









// =====================================
// COPY CODE
// =====================================


function copyCode(){


let box =
document.getElementById("arduinoCode");



box.select();



document.execCommand("copy");



alert("Arduino code copied!");



}









// =====================================
// DOWNLOAD INO
// =====================================


function downloadCode(){



let name =
document.getElementById("projectName").value;



if(name=="")
name="My_Project";




let code =
document.getElementById("arduinoCode").value;




let blob =
new Blob(
[code],
{
type:"text/plain"
}
);




let link =
document.createElement("a");



link.href =
URL.createObjectURL(blob);



link.download =
name.replace(/\s+/g,"_")+".ino";



link.click();



}



</script>


</body>

</html>
